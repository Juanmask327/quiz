<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz — Lección 1.1: ¿Qué es p5.js?</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #E8541A;
    --orange-light: #FF6B35;
    --orange-glow: rgba(232, 84, 26, 0.25);
    --dark: #0D0D14;
    --dark-2: #141420;
    --dark-3: #1C1C2E;
    --dark-4: #242438;
    --text: #F0EEE8;
    --text-muted: #8A8A9A;
    --correct: #2ECC71;
    --correct-bg: rgba(46, 204, 113, 0.12);
    --wrong: #E74C3C;
    --wrong-bg: rgba(231, 76, 60, 0.12);
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,84,26,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,84,26,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--dark-3);
    border: 1px solid rgba(232,84,26,0.3);
    border-radius: 99px;
    padding: 6px 16px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 20px;
  }

  .badge::before {
    content: '';
    width: 7px; height: 7px;
    background: var(--orange);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  h1 {
    font-family: 'Sora', sans-serif;
    font-size: clamp(26px, 5vw, 38px);
    font-weight: 800;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  h1 span { color: var(--orange); }

  .subtitle {
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* PROGRESS */
  .progress-bar-wrap {
    background: var(--dark-3);
    border-radius: 99px;
    height: 6px;
    margin-bottom: 40px;
    overflow: hidden;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--orange), var(--orange-light));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: 0 0 12px var(--orange-glow);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-family: 'Space Mono', monospace;
    animation: fadeDown 0.6s 0.15s ease both;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--dark-2);
    border: 1px solid var(--dark-4);
    border-radius: 20px;
    padding: 36px;
    margin-bottom: 24px;
    animation: slideUp 0.5s ease both;
    transition: border-color 0.3s;
  }

  .question-card:hover { border-color: rgba(232,84,26,0.2); }

  .question-num {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--orange);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .question-text {
    font-size: 18px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 28px;
    color: var(--text);
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--dark-3);
    border: 1.5px solid transparent;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    text-align: left;
    width: 100%;
  }

  .option:hover:not(:disabled) {
    border-color: var(--orange);
    background: var(--dark-4);
    transform: translateX(4px);
  }

  .option:disabled { cursor: default; }

  .option-letter {
    min-width: 30px;
    height: 30px;
    border-radius: 8px;
    background: var(--dark-4);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    transition: all 0.2s;
  }

  .option.selected {
    border-color: var(--orange);
    background: rgba(232,84,26,0.08);
  }
  .option.selected .option-letter {
    background: var(--orange);
    color: white;
  }

  .option.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }
  .option.correct .option-letter {
    background: var(--correct);
    color: white;
  }

  .option.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }
  .option.wrong .option-letter {
    background: var(--wrong);
    color: white;
  }

  /* FEEDBACK */
  .feedback {
    margin-top: 20px;
    padding: 16px 20px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    display: none;
    animation: fadeUp 0.3s ease both;
  }

  .feedback.show { display: flex; gap: 12px; align-items: flex-start; }

  .feedback.correct-fb {
    background: var(--correct-bg);
    border: 1px solid rgba(46,204,113,0.3);
    color: #7DFFA0;
  }

  .feedback.wrong-fb {
    background: var(--wrong-bg);
    border: 1px solid rgba(231,76,60,0.3);
    color: #FFB3AD;
  }

  .feedback-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .feedback-text strong { display: block; margin-bottom: 4px; font-size: 15px; }

  /* BUTTONS */
  .btn-check {
    margin-top: 20px;
    width: 100%;
    padding: 15px 24px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  .btn-check:hover:not(:disabled) {
    background: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--orange-glow);
  }

  .btn-check:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-next {
    margin-top: 12px;
    width: 100%;
    padding: 15px 24px;
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--dark-4);
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }

  .btn-next.show { display: block; animation: fadeUp 0.3s ease both; }
  .btn-next:hover { border-color: var(--orange); color: var(--orange); }

  /* SCORE SCREEN */
  .score-screen {
    display: none;
    text-align: center;
    background: var(--dark-2);
    border: 1px solid var(--dark-4);
    border-radius: 20px;
    padding: 56px 36px;
    animation: slideUp 0.5s ease both;
  }

  .score-screen.show { display: block; }

  .score-circle {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid var(--orange);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    background: rgba(232,84,26,0.08);
    box-shadow: 0 0 40px var(--orange-glow);
    animation: scaleIn 0.5s 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .score-number {
    font-family: 'Space Mono', monospace;
    font-size: 44px;
    font-weight: 700;
    color: var(--orange);
    line-height: 1;
  }

  .score-total {
    font-size: 13px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
  }

  .score-title {
    font-size: 26px;
    font-weight: 800;
    margin-bottom: 12px;
  }

  .score-message {
    color: var(--text-muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto 32px;
  }

  .score-breakdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 36px;
  }

  .score-stat {
    background: var(--dark-3);
    border-radius: var(--radius);
    padding: 14px 24px;
    text-align: center;
  }

  .score-stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 24px;
    font-weight: 700;
  }

  .score-stat-num.green { color: var(--correct); }
  .score-stat-num.red { color: var(--wrong); }

  .score-stat-label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 4px;
  }

  .btn-restart {
    padding: 15px 40px;
    background: var(--orange);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover {
    background: var(--orange-light);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--orange-glow);
  }

  /* ANIMATIONS */
  @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:none; } }
  @keyframes fadeUp   { from { opacity:0; transform:translateY(10px);  } to { opacity:1; transform:none; } }
  @keyframes slideUp  { from { opacity:0; transform:translateY(24px);  } to { opacity:1; transform:none; } }
  @keyframes scaleIn  { from { opacity:0; transform:scale(0.7); }        to { opacity:1; transform:scale(1); } }
  @keyframes pulse    { 0%,100%{opacity:1;} 50%{opacity:0.4;} }

  /* P5 decoration */
  .p5-deco {
    position: fixed;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,84,26,0.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .p5-deco2 {
    position: fixed;
    bottom: -80px; left: -80px;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,84,26,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
</style>
</head>
<body>

<div class="p5-deco"></div>
<div class="p5-deco2"></div>

<div class="container">

  <div class="header">
    <div class="badge">Módulo 1 · Lección 1.1</div>
    <h1>Quiz: <span>¿Qué es p5.js</span><br>y para qué sirve?</h1>
    <p class="subtitle">5 preguntas · Retroalimentación inmediata</p>
  </div>

  <div class="progress-label">
    <span id="progressText">Pregunta 1 de 5</span>
    <span id="progressPct">0%</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>

  <!-- QUIZ AREA -->
  <div id="quizArea"></div>

  <!-- SCORE SCREEN -->
  <div class="score-screen" id="scoreScreen">
    <div class="score-circle">
      <div class="score-number" id="scoreNum">0</div>
      <div class="score-total" id="scoreTotal">/5</div>
    </div>
    <div class="score-title" id="scoreTitle"></div>
    <div class="score-message" id="scoreMsg"></div>
    <div class="score-breakdown">
      <div class="score-stat">
        <div class="score-stat-num green" id="correctCount">0</div>
        <div class="score-stat-label">Correctas</div>
      </div>
      <div class="score-stat">
        <div class="score-stat-num red" id="wrongCount">0</div>
        <div class="score-stat-label">Incorrectas</div>
      </div>
    </div>
    <button class="btn-restart" onclick="restartQuiz()">↺ Intentar de nuevo</button>
  </div>

</div>

<script>
const questions = [
  {
    num: 1,
    text: "¿En qué año fue creado p5.js?",
    options: ["2001", "2008", "2013", "2020"],
    correct: 2,
    feedback: {
      correct: "¡Exacto! p5.js fue creado en 2013 por Lauren McCarthy como una versión de Processing orientada al navegador web.",
      wrong: "No es esa la fecha. p5.js fue creado en 2013 por Lauren McCarthy, basándose en Processing (que sí nació en 2001, pero son proyectos distintos)."
    }
  },
  {
    num: 2,
    text: "¿Quién creó p5.js?",
    options: ["Casey Reas", "Ben Fry", "Lauren McCarthy", "Brendan Eich"],
    correct: 2,
    feedback: {
      correct: "¡Correcto! Lauren McCarthy creó p5.js en 2013. Casey Reas y Ben Fry, en cambio, crearon Processing en 2001, el lenguaje que inspiró a p5.js.",
      wrong: "No exactamente. p5.js fue creado por Lauren McCarthy. Casey Reas y Ben Fry son los creadores de Processing, el proyecto original que inspiró p5.js."
    }
  },
  {
    num: 3,
    text: "¿Cuál es el principal objetivo de p5.js?",
    options: [
      "Crear aplicaciones móviles nativas",
      "Hacer la programación creativa accesible en el navegador",
      "Diseñar bases de datos relacionales",
      "Reemplazar a JavaScript por completo"
    ],
    correct: 1,
    feedback: {
      correct: "¡Muy bien! p5.js está diseñado para hacer la programación creativa — arte, animación, visualización — accesible directamente en el navegador, sin instalaciones complicadas.",
      wrong: "No es esa su función. El objetivo principal de p5.js es hacer la programación creativa accesible en el navegador web, especialmente para artistas, diseñadores y educadores."
    }
  },
  {
    num: 4,
    text: "¿En qué lenguaje de programación está basado p5.js?",
    options: ["Python", "Java", "JavaScript", "C++"],
    correct: 2,
    feedback: {
      correct: "¡Correcto! p5.js es una biblioteca de JavaScript, lo que significa que corre directamente en el navegador sin necesidad de instalar nada adicional.",
      wrong: "No es ese lenguaje. p5.js es una biblioteca de JavaScript. Processing original estaba basado en Java, pero p5.js fue creado específicamente para el navegador usando JavaScript."
    }
  },
  {
    num: 5,
    text: "¿Cuál de estas afirmaciones sobre p5.js es VERDADERA?",
    options: [
      "Solo funciona si instalas un programa especial en tu computadora",
      "Es un lenguaje de programación completamente nuevo e independiente",
      "Permite ver el resultado de tu código de forma inmediata en el navegador",
      "Fue creado por la misma persona que inventó JavaScript"
    ],
    correct: 2,
    feedback: {
      correct: "¡Exactamente! Una de las grandes ventajas de p5.js es la retroalimentación visual inmediata: escribes código y al instante ves el resultado en pantalla. Eso hace que aprender sea mucho más intuitivo.",
      wrong: "Esa afirmación no es correcta. La verdadera ventaja de p5.js es que permite ver el resultado de tu código de forma inmediata en el navegador, sin instalaciones y con retroalimentación visual instantánea."
    }
  }
];

const letters = ['A', 'B', 'C', 'D'];
let current = 0;
let score = 0;
let answered = false;

function renderQuestion(index) {
  answered = false;
  const q = questions[index];
  const pct = Math.round((index / questions.length) * 100);

  document.getElementById('progressText').textContent = `Pregunta ${index + 1} de ${questions.length}`;
  document.getElementById('progressPct').textContent = `${pct}%`;
  document.getElementById('progressFill').style.width = `${pct}%`;

  const html = `
    <div class="question-card">
      <div class="question-num">Pregunta ${q.num} / ${questions.length}</div>
      <div class="question-text">${q.text}</div>
      <div class="options" id="options">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="selectOption(${i})" id="opt${i}">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback">
        <span class="feedback-icon" id="fbIcon"></span>
        <div class="feedback-text" id="fbText"></div>
      </div>
      <button class="btn-check" id="btnCheck" onclick="checkAnswer()" disabled>
        Verificar respuesta
      </button>
      <button class="btn-next" id="btnNext" onclick="nextQuestion()">
        ${index < questions.length - 1 ? 'Siguiente pregunta →' : 'Ver resultados →'}
      </button>
    </div>
  `;

  document.getElementById('quizArea').innerHTML = html;
}

let selectedOption = null;

function selectOption(i) {
  if (answered) return;
  selectedOption = i;
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.classList.toggle('selected', idx === i);
  });
  document.getElementById('btnCheck').disabled = false;
}

function checkAnswer() {
  if (answered || selectedOption === null) return;
  answered = true;

  const q = questions[current];
  const isCorrect = selectedOption === q.correct;
  if (isCorrect) score++;

  // Style options
  document.querySelectorAll('.option').forEach((el, idx) => {
    el.disabled = true;
    if (idx === q.correct) el.classList.add('correct');
    else if (idx === selectedOption && !isCorrect) el.classList.add('wrong');
  });

  // Feedback
  const fb = document.getElementById('feedback');
  const fbIcon = document.getElementById('fbIcon');
  const fbText = document.getElementById('fbText');

  fb.classList.add('show', isCorrect ? 'correct-fb' : 'wrong-fb');
  fbIcon.textContent = isCorrect ? '✓' : '✗';
  fbText.innerHTML = `<strong>${isCorrect ? '¡Respuesta correcta!' : 'Respuesta incorrecta'}</strong>${q.feedback[isCorrect ? 'correct' : 'wrong']}`;

  document.getElementById('btnCheck').disabled = true;
  const btnNext = document.getElementById('btnNext');
  btnNext.classList.add('show');
}

function nextQuestion() {
  current++;
  if (current < questions.length) {
    renderQuestion(current);
    selectedOption = null;
  } else {
    showScore();
  }
}

function showScore() {
  document.getElementById('quizArea').innerHTML = '';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressText').textContent = `Completado`;

  const wrong = questions.length - score;
  document.getElementById('scoreNum').textContent = score;
  document.getElementById('scoreTotal').textContent = `/${questions.length}`;
  document.getElementById('correctCount').textContent = score;
  document.getElementById('wrongCount').textContent = wrong;

  let title, msg;
  if (score === 5) {
    title = "¡Perfecto! 🎉";
    msg = "Dominas completamente los conceptos de esta lección. Estás listo para la Lección 1.2: configuración de tu entorno de trabajo.";
  } else if (score >= 3) {
    title = "¡Muy bien! 👍";
    msg = "Tienes una buena base. Puedes revisar las preguntas que fallaste y luego avanzar a la Lección 1.2.";
  } else {
    title = "Sigue practicando 💪";
    msg = "Te recomendamos ver nuevamente el video antes de continuar. Presta especial atención a la historia de p5.js y sus características principales.";
  }

  document.getElementById('scoreTitle').textContent = title;
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('scoreScreen').classList.add('show');
}

function restartQuiz() {
  current = 0;
  score = 0;
  selectedOption = null;
  answered = false;
  document.getElementById('scoreScreen').classList.remove('show');
  renderQuestion(0);
}

// Init
renderQuestion(0);
</script>
</body>
</html>
